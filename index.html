<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#startButton {
position:fixed;
z-index:9999;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:16px 28px;
font-size:20px;
border-radius:14px;
border:none;
background:white;
color:black;
}

#msg {
position:fixed;
z-index:9999;
bottom:20px;
left:10px;
right:10px;
color:white;
background:rgba(0,0,0,0.55);
padding:10px;
text-align:center;
border-radius:10px;
font-size:15px;
}
</style>
</head>

<body>

<button id="startButton">Start Wedding AR</button>
<div id="msg">Tap start, then point at the wedding photo</div>

<a-scene
mindar-image="imageTargetSrc: targets.mind; filterMinCF:0.001; filterBeta:0.01;"
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-assets>
<video id="video" src="overlay.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

  <!-- soft golden glow -->
  <a-plane
    width="1.08"
    height="0.72"
    position="0 0 0.01"
    material="color:#ffd700; opacity:0.18; transparent:true">
  </a-plane>

  <!-- main video -->
  <a-video id="portraitVideo"
    src="#video"
    width="1"
    height="0.65"
    position="0 0 0.03"
    material="transparent:true; opacity:0.96">
  </a-video>

  <!-- simple sparkles -->
  <a-text
    value="✨"
    position="-0.45 0.25 0.05"
    scale="0.35 0.35 0.35"
    animation="property: position; to: -0.45 0.32 0.05; dir: alternate; dur: 1200; loop: true">
  </a-text>

  <a-text
    value="✨"
    position="0.42 -0.25 0.05"
    scale="0.30 0.30 0.30"
    animation="property: position; to: 0.42 -0.18 0.05; dir: alternate; dur: 1500; loop: true">
  </a-text>

  <a-text
    value="💫"
    position="0.38 0.25 0.05"
    scale="0.25 0.25 0.25"
    animation="property: rotation; to: 0 0 360; dur: 2500; loop: true">
  </a-text>

</a-entity>

</a-scene>

<script>
const startButton = document.getElementById("startButton");
const msg = document.getElementById("msg");
const video = document.getElementById("video");
const target = document.getElementById("target");

startButton.addEventListener("click", async () => {
  startButton.style.display = "none";
  msg.innerText = "Camera loading. Please allow camera access.";

  try {
    await video.play();
    video.pause();
  } catch (e) {}

  msg.innerText = "Point camera at the wedding photo";
});

target.addEventListener("targetFound", () => {
  msg.innerText = "Photo detected ❤️";
  video.currentTime = 0;
  video.play();
});

target.addEventListener("targetLost", () => {
  msg.innerText = "Point camera at the wedding photo";
  video.pause();
});
</script>

</body>
</html>
